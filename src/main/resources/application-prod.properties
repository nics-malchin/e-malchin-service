# --- App ---
spring.application.name=e-malchin-service
server.port=8081

# --- Keycloak JWT (Resource Server) ---
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://auth.nics-malchin.mn/realms/nics
keycloak.token-url=https://auth.nics-malchin.mn/realms/nics/protocol/openid-connect/token

# --- Keycloak client info (used only in /auth/login) ---
keycloak.client-id=${KEYCLOAK_CLIENT_ID:e-malchin-app}
keycloak.client-secret=${KEYCLOAK_CLIENT_SECRET}
keycloak.auth-server-url=${KEYCLOAK_AUTH_SERVER_URL:https://auth.nics-malchin.mn}
keycloak.realm=${KEYCLOAK_REALM:nics}
keycloak.admin.username=${KEYCLOAK_ADMIN_USERNAME}
keycloak.admin.password=${KEYCLOAK_ADMIN_PASSWORD}
