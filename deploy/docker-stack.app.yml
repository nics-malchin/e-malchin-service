version: "3.9"

services:
  api:
    image: ${API_IMAGE}
    env_file:
      - ${APP_ENV_FILE}
    networks:
      - app_internal
      - edge
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        order: start-first
        failure_action: rollback
      rollback_config:
        parallelism: 1
        order: stop-first
      restart_policy:
        condition: on-failure

  gui:
    image: ${GUI_IMAGE}
    networks:
      - edge
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        order: start-first
        failure_action: rollback
      rollback_config:
        parallelism: 1
        order: stop-first
      restart_policy:
        condition: on-failure

networks:
  app_internal:
    driver: overlay
  edge:
    external: true
